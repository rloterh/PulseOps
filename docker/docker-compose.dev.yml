services:
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      target: deps
    command: sh -c "pnpm install && pnpm --filter @pulseops/web dev --hostname 0.0.0.0"
    env_file:
      - ../.env.example
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
      - pulseops-node-modules:/app/node_modules

volumes:
  pulseops-node-modules:
